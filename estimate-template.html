<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimate</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Open+Sans:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e0e0e0;
    font-family: 'Open Sans', Arial, sans-serif;
    color: #1a3a6b;
    font-size: 13px;
  }

  /* ── Print button (fixed) ── */
  .print-btn {
    position: fixed;
    top: 16px;
    right: 20px;
    background: #1a3a6b;
    color: #fff;
    border: none;
    padding: 9px 20px;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
    z-index: 999;
    font-family: 'Open Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .print-btn:hover { background: #0f2550; }

  /* ── Page shell ── */
  .page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    margin: 20px auto;
    padding: 14mm;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 6px;
  }
  .logo-mark {
    flex-shrink: 0;
    width: 70px;
    height: 70px;
  }
  .logo-mark img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }
  .company-block { flex: 1; }
  .company-name {
    font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: 1px;
    color: #1a3a6b;
    line-height: 1.05;
    text-transform: uppercase;
  }
  .company-address {
    font-size: 12.5px;
    font-weight: 700;
    color: #1a3a6b;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }
  .govt-reg {
    font-size: 10.5px;
    font-weight: 600;
    color: #1a3a6b;
    margin-top: 5px;
    line-height: 1.55;
  }
  .ssi-block {
    flex-shrink: 0;
    text-align: right;
    font-size: 10.5px;
    font-weight: 700;
    color: #1a3a6b;
    line-height: 1.6;
    padding-top: 4px;
  }

  /* ── Double rule ── */
  .double-rule {
    border: none;
    margin: 6px 0 0 0;
    height: 4px;
    border-top: 1.5px solid #1a3a6b;
    box-shadow: 0 3px 0 0 #1a3a6b;
  }

  /* ── Sub-header: phone / title / date ── */
  .subheader {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 8px;
    margin-bottom: 0;
  }
  .phone-block {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    color: #1a3a6b;
    line-height: 1.6;
    min-width: 140px;
  }
  .phone-label { font-weight: 700; }
  .doc-title {
    flex: 1;
    text-align: center;
    font-size: 19px;
    font-weight: 800;
    color: #1a3a6b;
    font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .date-block {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    color: #1a3a6b;
    min-width: 160px;
    text-align: right;
  }
  .date-line {
    display: inline-block;
    width: 120px;
    border-bottom: 1px solid #1a3a6b;
    margin-left: 4px;
    vertical-align: bottom;
  }

  /* ── Second double rule ── */
  .double-rule-2 {
    border: none;
    margin: 6px 0 0 0;
    height: 4px;
    border-top: 1.5px solid #1a3a6b;
    box-shadow: 0 3px 0 0 #1a3a6b;
  }

  /* ── Customer info row ── */
  .customer-row {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #d0d8e8;
  }
  .cfield { flex: 1; }
  .cfield-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7a8aaa;
    margin-bottom: 3px;
  }
  .cfield-value {
    font-size: 13px;
    color: #1a3a6b;
    font-weight: 600;
    border-bottom: 1px solid #c0c8d8;
    padding-bottom: 2px;
    min-height: 20px;
  }

  /* ── BODY – parts table area ── */
  .body-area {
    flex: 1;
    min-height: 120mm;
    padding-top: 4px;
  }
  .parts-table { width: 100%; border-collapse: collapse; }
  .parts-table thead tr { background: #1a3a6b; color: #fff; }
  .parts-table thead th {
    padding: 7px 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: left;
  }
  .parts-table thead th.right { text-align: right; }
  .parts-table tbody tr:nth-child(even) { background: #f0f4fa; }
  .parts-table tbody td {
    padding: 8px 10px;
    font-size: 12px;
    color: #1a3a6b;
    border-bottom: 1px solid #e0e8f0;
  }
  .parts-table tbody td.right { text-align: right; font-family: 'Courier New', monospace; }
  .parts-table tbody td.num { color: #7a8aaa; font-size: 11px; }
  .parts-table tbody td.bold { font-weight: 700; }

  /* ── Total block ── */
  .total-block {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
  }
  .total-inner {
    background: #1a3a6b;
    color: #fff;
    padding: 10px 18px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 20px;
    min-width: 220px;
    justify-content: space-between;
  }
  .total-inner-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .total-inner-value {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
  }

  /* ── Remarks ── */
  .remarks-section {
    margin-top: 14px;
    border: 1px solid #d0d8e8;
    border-radius: 4px;
    padding: 10px 14px;
  }
  .remarks-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7a8aaa;
    margin-bottom: 4px;
  }
  .remarks-text { font-size: 12px; color: #1a3a6b; line-height: 1.6; }

  /* ── Footer ── */
  .footer-rule {
    border: none;
    margin: 0;
    height: 4px;
    border-top: 1.5px solid #1a3a6b;
    box-shadow: 0 3px 0 0 #1a3a6b;
  }
  .footer-text {
    margin-top: 7px;
    text-align: center;
    font-size: 9.8px;
    font-weight: 700;
    color: #1a3a6b;
    line-height: 1.75;
  }

  /* ── Doc number badge ── */
  .doc-number-badge {
    display: inline-block;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: 700;
    background: #e8eef8;
    border: 1px solid #1a3a6b;
    color: #1a3a6b;
    border-radius: 3px;
    padding: 2px 8px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ── Loading ── */
  .loading { padding: 40px; text-align: center; color: #7a8aaa; }

  /* ── Print ── */
  @media print {
    @page { size: A4 portrait; margin: 0; }
    body { background: #fff; margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .print-btn { display: none !important; }
    .page { margin: 0; box-shadow: none; width: 100%; min-height: 100vh; padding: 14mm; }
  }
</style>
</head>
<body>

<button class="print-btn" onclick="setTimeout(function(){ window.print(); }, 300)">🖨 Print / Save PDF</button>

<div class="page" id="page">
  <div class="loading">Loading estimate data…</div>
</div>

<script>
function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch(e) { return dateStr; }
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function render(data) {
  const { config, logoDataUrl, docNum, customer, vehicle, plate, date, cart, remarks } = data;
  const sym = config.currency_symbol || '₹';

  document.title = docNum + ' – Estimate – ' + config.workshop_name;

  // Build parts table rows
  let partsTotal = 0;
  const rows = cart.map((item, i) => {
    const line = item.price * item.qty;
    partsTotal += line;
    return `<tr>
      <td class="num">${i + 1}</td>
      <td>${escHtml(item.name)}</td>
      <td class="right">${item.qty}</td>
      <td class="right">${sym}${item.price.toLocaleString('en-IN')}</td>
      <td class="right bold">${sym}${line.toLocaleString('en-IN')}</td>
    </tr>`;
  }).join('');

  // Logo
  const logoHtml = logoDataUrl
    ? `<div class="logo-mark"><img src="${logoDataUrl}" alt="Logo"></div>`
    : '';

  // Address lines
  const addressParts = config.address ? config.address.split(',').map(s => s.trim()) : [];
  const addressLine1 = addressParts.slice(0, 2).join(', ');
  const addressLine2 = addressParts.slice(2).join(', ');

  // Phone numbers
  const phoneMain = config.phone || '';
  const phoneAlt = config.whatsapp || '';

  // Customer row
  const customerRow = (customer || vehicle || plate) ? `
    <div class="customer-row">
      <div class="cfield">
        <div class="cfield-label">Customer</div>
        <div class="cfield-value">${escHtml(customer || '—')}</div>
      </div>
      <div class="cfield">
        <div class="cfield-label">Vehicle</div>
        <div class="cfield-value">${escHtml(vehicle || '—')}</div>
      </div>
      <div class="cfield">
        <div class="cfield-label">Reg. No.</div>
        <div class="cfield-value">${escHtml(plate || '—')}</div>
      </div>
    </div>` : '';

  // Remarks block
  const remarksHtml = remarks ? `
    <div class="remarks-section">
      <div class="remarks-label">Remarks</div>
      <div class="remarks-text">${escHtml(remarks)}</div>
    </div>` : '';

  document.getElementById('page').innerHTML = `
    <!-- HEADER -->
    <div class="header">
      ${logoHtml}
      <div class="company-block">
        <div class="company-name">${escHtml(config.workshop_name)}</div>
        ${addressLine1 ? `<div class="company-address">${escHtml(addressLine1)}</div>` : ''}
        ${addressLine2 ? `<div class="company-address">${escHtml(addressLine2)}</div>` : ''}
      </div>
    </div>

    <!-- DOUBLE RULE 1 -->
    <hr class="double-rule" />

    <!-- SUB-HEADER: Phone / Title / Date -->
    <div class="subheader">
      <div class="phone-block">
        ${phoneMain ? `<span class="phone-label">Phone</span> ${escHtml(phoneMain)}<br>` : ''}
        ${phoneAlt && phoneAlt !== phoneMain ? `&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${escHtml(phoneAlt)}` : ''}
      </div>
      <div class="doc-title">Estimate / Quotation</div>
      <div class="date-block">
        Date <span class="date-line">${formatDate(date)}</span>
        <br>
        <span class="doc-number-badge">${escHtml(docNum)}</span>
      </div>
    </div>

    <!-- DOUBLE RULE 2 -->
    <hr class="double-rule-2" />

    <!-- CUSTOMER INFO -->
    ${customerRow}

    <!-- BODY – PARTS TABLE -->
    <div class="body-area">
      <table class="parts-table">
        <thead>
          <tr>
            <th style="width:28px">#</th>
            <th>Description</th>
            <th class="right" style="width:40px">Qty</th>
            <th class="right" style="width:90px">Unit Price</th>
            <th class="right" style="width:90px">Total</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

      <!-- TOTAL -->
      <div class="total-block">
        <div class="total-inner">
          <span class="total-inner-label">Total</span>
          <span class="total-inner-value">${sym}${partsTotal.toLocaleString('en-IN')}</span>
        </div>
      </div>

      <!-- REMARKS -->
      ${remarksHtml}
    </div>

    <!-- FOOTER DOUBLE RULE -->
    <hr class="footer-rule" />

    <!-- FOOTER TEXT -->
    <div class="footer-text">
      Manufacturing Steel Doors and windows, All types of Structural works, All types of Automobile works such as<br>
      Repair maintenance Overhauling. Patch work, Painting and Body building, Scanning &amp; Programming<br>
      All types of Hydraulic works and Heavy Earthmoving equipments Repair and Overhauling<br>
      Manufacturing agriculture tools and accessories<br>
      B.R.C.Gas equipment Italy Govt Approved L.P.G. Retro Fitting Centre
    </div>
  `;
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
    e.preventDefault();
    window.print();
  }
});

// ── Load data from localStorage ──
(function init() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('key');
  if (!key) {
    document.getElementById('page').innerHTML = '<div class="loading">No data found. Please generate from the Workshop App.</div>';
    return;
  }
  try {
    const raw = localStorage.getItem(key);
    if (!raw) throw new Error('Data not found — please regenerate from the Workshop App');
    const data = JSON.parse(raw);
    localStorage.removeItem(key);
    window.PDF_DATA = data;
    render(data);
  } catch(e) {
    document.getElementById('page').innerHTML = '<div class="loading">Could not load estimate data: ' + escHtml(e.message) + '</div>';
  }
})();
</script>
</body>
</html>
