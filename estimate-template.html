<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimate</title>
<style>
  /*
  ================================================================
  ESTIMATE TEMPLATE
  ================================================================
  This file controls 100% of what your Estimate PDF looks like.
  Edit freely — index.html passes data in, this file renders it.

  DATA AVAILABLE (via window.PDF_DATA):
    .config         → workshop_name, address, phone, email, whatsapp, currency_symbol
    .logoDataUrl    → base64 logo image string (or null)
    .docNum         → e.g. "EST-001"
    .customer       → customer name
    .vehicle        → vehicle name
    .plate          → registration number
    .date           → ISO date string e.g. "2024-06-10"
    .cart           → array of { name, price, qty }
    .remarks        → notes string
  ================================================================
  */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #fff;
    padding: 0;
  }

  /* ── PRINT CONTROLS (hidden in PDF) ── */
  .print-controls {
    background: #111;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    print-color-adjust: exact;
  }
  .print-controls span { font-size: 13px; opacity: 0.8; }
  .btn-print {
    background: #fff;
    color: #111;
    border: none;
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .btn-print:hover { background: #e0e0e0; }

  @media print {
    .print-controls { display: none !important; }
    body { padding: 0; }
    .page { box-shadow: none !important; margin: 0 !important; border: none !important; }
  }

  /* ── PAGE WRAPPER ── */
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 20px auto;
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .doc-header {
    background: #fff;
    padding: 24px 24px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #e0e0e0;
    margin-bottom: 28px;
  }
  .doc-header-logo {
    width: 48px;
    height: 48px;
    object-fit: contain;
    border-radius: 6px;
    background: #f0f0f0;
    flex-shrink: 0;
  }
  .doc-header-text { flex: 1; min-width: 0; }
  .doc-workshop-name {
    font-size: 26px;
    font-weight: 700;
    color: #000;
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .doc-workshop-meta {
    font-size: 11px;
    color: #666;
    margin-top: 3px;
    line-height: 1.5;
  }

  /* ── DOC TYPE BAND ── */
  .doc-type-band {
    padding: 0 24px 14px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .doc-type-label {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #000;
  }
  .doc-meta-right { text-align: right; }
  .doc-number { font-size: 13px; font-weight: 700; color: #333; font-family: 'Courier New', monospace; }
  .doc-date { font-size: 14px; font-weight: 600; color: #333; margin-top: 2px; }

  /* ── CUSTOMER ROW ── */
  .customer-row {
    padding: 14px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    border-bottom: 1px solid #e0e0e0;
  }
  .cfield-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 3px;
  }
  .cfield-value { font-size: 13px; color: #1a1a1a; font-weight: 500; }

  /* ── PARTS TABLE ── */
  .table-section { padding: 0 24px; margin-top: 30px; }
  .table-heading {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 6px;
  }
  .parts-table { width: 100%; border-collapse: collapse; }
  .parts-table thead tr {
    background: #d9d9d9;
    color: #000;
  }
  .parts-table thead th {
    padding: 8px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: left;
  }
  .parts-table thead th.right { text-align: right; }
  .parts-table tbody tr:nth-child(even) { background: #fafafa; }
  .parts-table tbody td {
    padding: 8px 10px;
    font-size: 12px;
    color: #222;
    border-bottom: 1px solid #f0f0f0;
  }
  .parts-table tbody td.right { text-align: right; font-family: 'Courier New', monospace; }
  .parts-table tbody td.num { color: #999; font-size: 11px; }
  .parts-table tbody td.bold { font-weight: 600; }

  /* ── TOTAL BLOCK ── */
  .total-block {
    margin: 16px 24px 0;
    display: flex;
    justify-content: flex-end;
  }
  .total-inner {
    background: #fff;
    color: #000;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    min-width: 220px;
    justify-content: space-between;
  }
  .total-inner-label { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .total-inner-value { font-size: 26px; font-weight: 700; font-family: 'Courier New', monospace; color: #000; }

  /* ── REMARKS ── */
  .remarks-section {
    margin: 16px 24px 0;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 12px 14px;
  }
  .remarks-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 6px;
  }
  .remarks-text { font-size: 12px; color: #444; line-height: 1.6; }

  /* ── FOOTER ── */
  .doc-footer {
    margin-top: auto;
    background: #f5f5f5;
    border-top: 1px solid #e0e0e0;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-left { font-size: 10px; color: #888; }
  .footer-right { font-size: 10px; color: #aaa; font-style: italic; }

  /* ── LOADING STATE ── */
  .loading { padding: 40px; text-align: center; color: #888; }
</style>
</head>
<body>

<div class="print-controls">
  <span id="print-label">Preparing estimate…</span>
  <button class="btn-print" onclick="window.print()">🖨 Print / Save as PDF</button>
</div>

<div class="page" id="page">
  <div class="loading">Loading estimate data…</div>
</div>

<script>
// ════════════════════════════════════════════════════════
// ESTIMATE TEMPLATE RENDERER
//
// To redesign: only edit the HTML/CSS above this script.
// This script pulls data from sessionStorage and fills in
// the template. You don't need to touch index.html at all.
// ════════════════════════════════════════════════════════

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  } catch(e) { return dateStr; }
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function render(data) {
  const { config, logoDataUrl, docNum, customer, vehicle, plate, date, cart, remarks } = data;
  const sym = config.currency_symbol || '₹';

  document.title = docNum + ' – Estimate – ' + config.workshop_name;
  document.getElementById('print-label').textContent = config.workshop_name;

  // Build parts table rows
  let partsTotal = 0;
  const rows = cart.map((item, i) => {
    const line = item.price * item.qty;
    partsTotal += line;
    return `<tr>
      <td class="num">${i + 1}</td>
      <td>${escHtml(item.name)}</td>
      <td class="right">${item.qty}</td>
      <td class="right">${sym}${item.price.toLocaleString('en-IN')}</td>
      <td class="right bold">${sym}${line.toLocaleString('en-IN')}</td>
    </tr>`;
  }).join('');

  // Build address/contact meta
  let metaParts = [];
  if (config.address) metaParts.push(config.address);
  const contacts = [];
  if (config.phone) contacts.push('📞 ' + config.phone);
  if (config.email) contacts.push(config.email);
  if (contacts.length) metaParts.push(contacts.join('  ·  '));
  const metaHtml = metaParts.map(l => escHtml(l)).join('<br>');

  // Remarks block
  const remarksHtml = remarks ? `
    <div class="remarks-section">
      <div class="remarks-label">Remarks</div>
      <div class="remarks-text">${escHtml(remarks)}</div>
    </div>` : '';

  // Logo
  const logoHtml = logoDataUrl
    ? `<img class="doc-header-logo" src="${logoDataUrl}" alt="Logo">`
    : '';

  document.getElementById('page').innerHTML = `
    <!-- HEADER -->
    <div class="doc-header">
      ${logoHtml}
      <div class="doc-header-text">
        <div class="doc-workshop-name">${escHtml(config.workshop_name)}</div>
        ${metaHtml ? `<div class="doc-workshop-meta">${metaHtml}</div>` : ''}
      </div>
    </div>

    <!-- DOC TYPE -->
    <div class="doc-type-band">
      <div class="doc-type-label">Estimate</div>
      <div class="doc-meta-right">
        <div class="doc-date">${formatDate(date)}</div>
      </div>
    </div>

    <!-- CUSTOMER INFO -->
    <div class="customer-row">
      <div>
        <div class="cfield-label">Customer</div>
        <div class="cfield-value">${escHtml(customer || '—')}</div>
      </div>
      <div>
        <div class="cfield-label">Vehicle</div>
        <div class="cfield-value">${escHtml(vehicle || '—')}</div>
      </div>
      <div>
        <div class="cfield-label">Reg. No.</div>
        <div class="cfield-value">${escHtml(plate || '—')}</div>
      </div>
    </div>

    <!-- PARTS TABLE -->
    <div class="table-section">
      <div class="table-heading">Parts &amp; Items</div>
      <table class="parts-table">
        <thead>
          <tr>
            <th style="width:28px">#</th>
            <th>Description</th>
            <th class="right" style="width:40px">Qty</th>
            <th class="right" style="width:80px">Unit Price</th>
            <th class="right" style="width:80px">Total</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <!-- TOTAL -->
    <div class="total-block">
      <div class="total-inner">
        <span class="total-inner-label">Total</span>
        <span class="total-inner-value">${sym}${partsTotal.toLocaleString('en-IN')}</span>
      </div>
    </div>

    <!-- REMARKS -->
    ${remarksHtml}

    <!-- FOOTER -->
    <div class="doc-footer">
      <div class="footer-left">${escHtml(config.workshop_name)}${config.phone ? '  ·  ' + escHtml(config.phone) : ''}</div>
      <div class="footer-right">This is an estimate — final prices may vary.</div>
    </div>
  `;
}

// ── Load data from sessionStorage ──
(function init() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('key');
  if (!key) {
    document.getElementById('page').innerHTML = '<div class="loading">No data found. Please generate from the Workshop App.</div>';
    return;
  }
  try {
    const raw = localStorage.getItem(key);
    if (!raw) throw new Error('Session expired');
    const data = JSON.parse(raw);
    localStorage.removeItem(key); // clean up
    window.PDF_DATA = data;         // expose for debugging
    render(data);
  } catch(e) {
    document.getElementById('page').innerHTML = `<div class="loading">Could not load estimate data: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
