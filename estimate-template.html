<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimate</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /*
  ================================================================
  ESTIMATE TEMPLATE
  ================================================================
  DATA AVAILABLE (via window.PDF_DATA):
    .config         → workshop_name, address, phone, email, whatsapp, currency_symbol
    .logoDataUrl    → base64 logo image string (or null)
    .docNum         → e.g. "EST-001"
    .customer       → customer name
    .vehicle        → vehicle name
    .plate          → registration number
    .date           → ISO date string e.g. "2024-06-10"
    .cart           → array of { name, price, qty }
    .remarks        → notes string
  ================================================================
  */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Open Sans', Arial, sans-serif;
    font-size: 13px;
    color: #1a3a6b;
    background: #fff;
  }

  /* ── PRINT CONTROLS (hidden in PDF) ── */
  .print-controls {
    background: #111;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .print-controls span { font-size: 13px; opacity: 0.8; }
  .btn-print {
    background: #fff;
    color: #111;
    border: none;
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .btn-print:hover { background: #e0e0e0; }

  @media print {
    @page { size: A4 portrait; margin: 0; }
    .print-controls { display: none !important; }
    body { background: #fff; margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { box-shadow: none !important; margin: 0 !important; border: none !important; width: 100%; min-height: 100vh; }
  }

  /* ── PAGE ── */
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 20px auto;
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    padding: 14mm;
  }

  /* ── HEADER ── */
  .doc-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 6px;
  }
  .doc-header-logo {
    flex-shrink: 0;
    width: 70px;
    height: 70px;
    object-fit: contain;
  }
  .doc-company-block { flex: 1; }
  .doc-workshop-name {
    font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: 1px;
    color: #1a3a6b;
    line-height: 1.05;
    text-transform: uppercase;
  }
  .doc-workshop-address {
    font-size: 12.5px;
    font-weight: 700;
    color: #1a3a6b;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }
  .doc-workshop-govt {
    font-size: 10.5px;
    font-weight: 600;
    color: #1a3a6b;
    margin-top: 5px;
    line-height: 1.55;
  }
  .doc-ssi-block {
    flex-shrink: 0;
    text-align: right;
    font-size: 10.5px;
    font-weight: 700;
    color: #1a3a6b;
    line-height: 1.6;
    padding-top: 4px;
  }

  /* ── DOUBLE RULE ── */
  .double-rule {
    border: none;
    margin: 6px 0 0 0;
    height: 4px;
    border-top: 1.5px solid #1a3a6b;
    box-shadow: 0 3px 0 0 #1a3a6b;
  }

  /* ── SUB-HEADER: Phone / Title / Date ── */
  .subheader {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 8px;
    margin-bottom: 0;
  }
  .phone-block {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    color: #1a3a6b;
    line-height: 1.6;
    min-width: 140px;
  }
  .phone-label { font-weight: 700; }
  .doc-title {
    flex: 1;
    text-align: center;
    font-size: 19px;
    font-weight: 800;
    color: #1a3a6b;
    font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .date-block {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    color: #1a3a6b;
    min-width: 160px;
    text-align: right;
  }
  .date-line {
    display: inline-block;
    border-bottom: 1px solid #1a3a6b;
    margin-left: 4px;
    vertical-align: bottom;
    padding: 0 4px;
  }

  /* ── DOUBLE RULE 2 ── */
  .double-rule-2 {
    border: none;
    margin: 6px 0 0 0;
    height: 4px;
    border-top: 1.5px solid #1a3a6b;
    box-shadow: 0 3px 0 0 #1a3a6b;
  }

  /* ── CUSTOMER ROW ── */
  .customer-row {
    padding: 14px 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    border-bottom: 1px solid #1a3a6b;
  }
  .cfield-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #1a3a6b; margin-bottom: 3px; }
  .cfield-value { font-size: 13px; color: #1a3a6b; font-weight: 600; }

  /* ── TABLE ── */
  .table-section { padding: 0; margin-top: 16px; }
  .table-heading {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1a3a6b;
    margin-bottom: 6px;
  }
  .parts-table { width: 100%; border-collapse: collapse; }
  .parts-table thead tr { background: #1a3a6b; color: #fff; }
  .parts-table thead th {
    padding: 8px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: left;
  }
  .parts-table thead th.right { text-align: right; }
  .parts-table tbody tr:nth-child(even) { background: #f0f4fa; }
  .parts-table tbody td { padding: 8px 10px; font-size: 12px; color: #1a3a6b; border-bottom: 1px solid #d0d8e8; }
  .parts-table tbody td.right { text-align: right; font-family: 'Courier New', monospace; }
  .parts-table tbody td.num { color: #6a8cbf; font-size: 11px; }
  .parts-table tbody td.bold { font-weight: 700; }

  /* ── TOTAL BLOCK ── */
  .total-block {
    margin: 16px 0 0;
    display: flex;
    justify-content: flex-end;
  }
  .total-inner {
    background: #1a3a6b;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    min-width: 220px;
    justify-content: space-between;
    border-radius: 6px;
  }
  .total-inner-label { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .total-inner-value { font-size: 26px; font-weight: 700; font-family: 'Courier New', monospace; color: #fff; }

  /* ── REMARKS ── */
  .remarks-section {
    margin: 16px 0 0;
    border: 1px solid #1a3a6b;
    border-radius: 6px;
    padding: 12px 14px;
  }
  .remarks-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #1a3a6b;
    margin-bottom: 6px;
  }
  .remarks-text { font-size: 12px; color: #1a3a6b; line-height: 1.6; }

  /* ── FOOTER RULE ── */
  .doc-footer {
    margin-top: auto;
  }
  .footer-rule {
    border: none;
    height: 4px;
    border-top: 1.5px solid #1a3a6b;
    box-shadow: 0 3px 0 0 #1a3a6b;
    margin: 0;
  }
  .footer-text {
    text-align: center;
    font-size: 9.8px;
    font-weight: 700;
    color: #1a3a6b;
    line-height: 1.75;
    padding-top: 7px;
  }

  .loading { padding: 40px; text-align: center; color: #888; }
</style>
</head>
<body>

<div class="print-controls no-print">
  <span id="print-label">Preparing estimate…</span>
  <button class="btn-print" onclick="window.print()">🖨 Print / Save as PDF</button>
</div>

<div class="page" id="page">
  <div class="loading">Loading estimate data…</div>
</div>

<script>
function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  } catch(e) { return dateStr; }
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function render(data) {
  const { config, logoDataUrl, docNum, customer, vehicle, plate, date, cart, remarks } = data;
  const sym = config.currency_symbol || '₹';

  document.title = docNum + ' – Estimate – ' + config.workshop_name;
  document.getElementById('print-label').textContent = config.workshop_name;

  // Build parts table rows
  let partsTotal = 0;
  const rows = cart.map((item, i) => {
    const line = item.price * item.qty;
    partsTotal += line;
    return `<tr>
      <td class="num">${i + 1}</td>
      <td>${escHtml(item.name)}</td>
      <td class="right">${item.qty}</td>
      <td class="right">${sym}${item.price.toLocaleString('en-IN')}</td>
      <td class="right bold">${sym}${line.toLocaleString('en-IN')}</td>
    </tr>`;
  }).join('');

  // Logo
  const logoHtml = logoDataUrl
    ? `<img class="doc-header-logo" src="${logoDataUrl}" alt="Logo">`
    : '';

  // Phone display
  const phoneHtml = config.phone ? `
    <div class="phone-block">
      <span class="phone-label">Phone</span> ${escHtml(config.phone)}
    </div>` : '';

  // SSI block
  const ssiHtml = config.ssi_number ? `
    <div class="doc-ssi-block">
      SSI Permanent Registration<br>
      No. ${escHtml(config.ssi_number)}
    </div>` : '';

  // Government registration
  const govtHtml = config.govt_reg_no ? `
    Government Approved :<br>
    No. ${escHtml(config.govt_reg_no)}` : '';

  // Remarks block
  const remarksHtml = remarks ? `
    <div class="remarks-section">
      <div class="remarks-label">Remarks</div>
      <div class="remarks-text">${escHtml(remarks)}</div>
    </div>` : '';

  document.getElementById('page').innerHTML = `
    <!-- HEADER -->
    <div class="doc-header">
      ${logoHtml}
      <div class="doc-company-block">
        <div class="doc-workshop-name">${escHtml(config.workshop_name)}</div>
        ${config.address ? `<div class="doc-workshop-address">${escHtml(config.address).replace(/(PO),\s*/i, '$1,<br>')}</div>` : ''}
        ${govtHtml ? `<div class="doc-workshop-govt">${govtHtml}</div>` : ''}
      </div>
      ${ssiHtml}
    </div>

    <!-- DOUBLE RULE 1 -->
    <hr class="double-rule" />

    <!-- SUB-HEADER: Phone / Title / Date -->
    <div class="subheader">
      ${phoneHtml}
      <div class="doc-title">Estimate/Quotation</div>
      <div class="date-block">
        Date : ${formatDate(date)}
      </div>
    </div>

    <!-- DOUBLE RULE 2 -->
    <hr class="double-rule-2" />

    <!-- CUSTOMER INFO -->
    <div class="customer-row">
      <div>
        <div class="cfield-label">Customer</div>
        <div class="cfield-value">${escHtml(customer || '—')}</div>
      </div>
      <div>
        <div class="cfield-label">Vehicle</div>
        <div class="cfield-value">${escHtml(vehicle || '—')}</div>
      </div>
      <div>
        <div class="cfield-label">Reg. No.</div>
        <div class="cfield-value">${escHtml(plate || '—')}</div>
      </div>
    </div>

    <!-- PARTS TABLE -->
    <div class="table-section">
      <div class="table-heading">Parts &amp; Items</div>
      <table class="parts-table">
        <thead>
          <tr>
            <th style="width:28px">#</th>
            <th>Description</th>
            <th class="right" style="width:40px">Qty</th>
            <th class="right" style="width:80px">Unit Price</th>
            <th class="right" style="width:80px">Total</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <!-- TOTAL -->
    <div class="total-block">
      <div class="total-inner">
        <span class="total-inner-label">Total</span>
        <span class="total-inner-value">${sym}${partsTotal.toLocaleString('en-IN')}</span>
      </div>
    </div>

    <!-- REMARKS -->
    ${remarksHtml}

    <!-- FOOTER -->
    <div class="doc-footer">
      <hr class="footer-rule" />
      <div class="footer-text">
        Manufacturing Steel Doors and windows, All types of Structural works, All types of Automobile works such as<br>
        Repair maintenance Overhauling. Patch work, Painting and Body building, Scanning &amp; Programming<br>
        All types of Hydraulic works and Heavy Earthmoving equipments Repair and Overhauling<br>
        Manufacturing agriculture tools and accessories<br>
        B.R.C.Gas equipment Italy Govt Approved L.P.G. Retro Fitment Centre
      </div>
    </div>
  `;
}

// ── Load data from localStorage ──
(function init() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('key');
  if (!key) {
    document.getElementById('page').innerHTML = '<div class="loading">No data found. Please generate from the Workshop App.</div>';
    return;
  }
  try {
    const raw = localStorage.getItem(key);
    if (!raw) throw new Error('Session expired');
    const data = JSON.parse(raw);
    localStorage.removeItem(key);
    window.PDF_DATA = data;
    render(data);
  } catch(e) {
    document.getElementById('page').innerHTML = `<div class="loading">Could not load estimate data: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
